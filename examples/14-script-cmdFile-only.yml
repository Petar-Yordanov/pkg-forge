---
entries:
  - kind: script
    name: cmdFile-only

    steps:
      - cmdFile: examples/scripts/echo-hello.sh
        shell: bash
        args: ["-e"]
        when:
          platform: [linux, macos]

      - cmdFile: examples/scripts/echo-hello.ps1
        shell: pwsh
        args: ["-NoProfile"]
        when:
          platform: [windows]
