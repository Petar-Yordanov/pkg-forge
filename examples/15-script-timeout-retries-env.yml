---
entries:
  - kind: script
    name: combined-controls

    steps:
      # Prints + asserts env var exists. Retries included.
      - cmd: pwsh -NoProfile -Command "Write-Host \"SOME_FLAG=$env:SOME_FLAG\"; if (-not $env:SOME_FLAG) { Write-Error 'missing SOME_FLAG'; exit 1 }; exit 0"
        env:
          SOME_FLAG: "1"
        retries: 2
        retryDelaySec: 1
        timeoutSec: 5
        when:
          platform: [windows]

      - cmd: bash -lc "echo \"SOME_FLAG=${SOME_FLAG}\"; test -n \"${SOME_FLAG}\""
        env:
          SOME_FLAG: "1"
        retries: 2
        retryDelaySec: 1
        timeoutSec: 5
        when:
          platform: [linux, macos]
